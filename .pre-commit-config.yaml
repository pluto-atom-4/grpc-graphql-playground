repos:
  # Go linting
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --fix
        language: system
        types: [go]
        pass_filenames: false

  # Python linting and formatting
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd recommender && uv run ruff check --fix .'
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd recommender && uv run ruff format .'
        language: system
        types: [python]
        pass_filenames: false

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: check-merge-conflict

  # Git checks
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [typescript, tsx, css, markdown, json, javascript]
        exclude: |
          (?x)^(
            node_modules|
            \.next|
            dist
          )
